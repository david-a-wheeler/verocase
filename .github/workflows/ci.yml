name: CI

# This pins dependencies to counter supply chain attacks.
# You have to update this file to update dependencies, but that's okay;
# dependabot will propose them, and we can decide when to accept.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: .github/workflows/ci.yml
      - name: Install ruff
        run: pip install ruff==0.15.8
      - name: Run lint
        run: ruff check verocase.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: .github/workflows/ci.yml
      - name: Install pyright
        run: pip install pyright==1.1.408
      - name: Run type check
        run: pyright verocase.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest tests.run_tests -v
